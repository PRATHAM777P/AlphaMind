  <line x1="60" y1="33" x2="60" y2="94" stroke="#1B4A7A" stroke-width="1" stroke-dasharray="4 3" opacity="0.7"/>
  <!-- Neural synapses — left side -->
  <circle cx="40" cy="52" r="2.5" fill="#26A69A"/>
  <circle cx="35" cy="66" r="2" fill="#26A69A" opacity="0.8"/>
  <circle cx="44" cy="78" r="2" fill="#26A69A" opacity="0.7"/>
  <circle cx="50" cy="44" r="2" fill="#5BC8F5" opacity="0.9"/>
  <!-- Neural synapses — right side -->
  <circle cx="80" cy="52" r="2.5" fill="#26A69A"/>
  <circle cx="85" cy="66" r="2" fill="#26A69A" opacity="0.8"/>
  <circle cx="76" cy="78" r="2" fill="#26A69A" opacity="0.7"/>
  <circle cx="70" cy="44" r="2" fill="#5BC8F5" opacity="0.9"/>
  <!-- Center node -->
  <circle cx="60" cy="63" r="4" fill="#5BC8F5" opacity="0.95"/>
  <!-- Synapse connections left -->
  <line x1="50" y1="44" x2="60" y2="63" stroke="#26A69A" stroke-width="0.8" opacity="0.5"/>
  <line x1="40" y1="52" x2="60" y2="63" stroke="#26A69A" stroke-width="0.8" opacity="0.5"/>
  <line x1="35" y1="66" x2="60" y2="63" stroke="#26A69A" stroke-width="0.8" opacity="0.4"/>
  <line x1="44" y1="78" x2="60" y2="63" stroke="#26A69A" stroke-width="0.8" opacity="0.4"/>
