  <circle cx="60" cy="60" r="50" fill="none" stroke="#1B4A7A" stroke-width="0.6" opacity="0.5"/>
  <!-- Brain hemispheres — left -->
  <path d="M60 32 C44 32 30 42 28 55 C26 64 30 72 36 77 C38 78 40 79 42 80 C42 85 44 90 48 93 C51 95 55 95 60 94"
        fill="none" stroke="#4A9ECC" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Brain hemispheres — right -->
  <path d="M60 32 C76 32 90 42 92 55 C94 64 90 72 84 77 C82 78 80 79 78 80 C78 85 76 90 72 93 C69 95 65 95 60 94"
        fill="none" stroke="#4A9ECC" stroke-width="2.2" stroke-linecap="round"/>
