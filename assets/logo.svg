  <line x1="70" y1="44" x2="60" y2="63" stroke="#26A69A" stroke-width="0.8" opacity="0.5"/>
  <line x1="80" y1="52" x2="60" y2="63" stroke="#26A69A" stroke-width="0.8" opacity="0.5"/>
  <line x1="85" y1="66" x2="60" y2="63" stroke="#26A69A" stroke-width="0.8" opacity="0.4"/>
  <line x1="76" y1="78" x2="60" y2="63" stroke="#26A69A" stroke-width="0.8" opacity="0.4"/>
  <!-- Alpha symbol overlay — subtle -->
  <text x="60" y="68" text-anchor="middle" font-family="Georgia, serif" font-size="18" font-weight="700"
